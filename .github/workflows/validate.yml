name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  static-validation:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run project validation
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\validate.ps1
